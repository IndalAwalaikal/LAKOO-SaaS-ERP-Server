version: '3.8'

services:
  # 1. Go API Backend
  api:
    build: ./api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - lakoo-network

  # 2. Python AI Service
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
    depends_on:
      - mysql
    networks:
      - lakoo-network

  # 3. MySQL Database Core
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    networks:
      - lakoo-network

  # 4. Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - lakoo-network

  # 5. MinIO File Storage
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - lakoo-network

networks:
  lakoo-network:
    driver: bridge

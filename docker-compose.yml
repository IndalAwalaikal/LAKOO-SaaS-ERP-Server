version: '3.8'

services:
  # Combined Backend (Go API + Python AI)
  backend:
    image: nexus050106/lakoo-saas:latest
    ports:
      - "8080:8080"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - AI_SERVICE_URL=http://localhost:8000
    depends_on:
      - mysql
      - redis
    volumes:
      - ./storage:/app/storage
    networks:
      - lakoo-network

  # 3. MySQL Database Core
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    networks:
      - lakoo-network

  # 4. Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - lakoo-network


networks:
  lakoo-network:
    driver: bridge
